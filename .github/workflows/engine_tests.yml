name: Engine Logic Tests

on:
  push:
    paths:
      - 'src/ui/autocomplete/engine.rs'
      - 'src/ui/autocomplete/engine_tests.rs'
      - '.github/workflows/engine_tests.yml'
  pull_request:
    paths:
      - 'src/ui/autocomplete/engine.rs'
      - 'src/ui/autocomplete/engine_tests.rs'

env:
  CARGO_TERM_COLOR: always

jobs:
  test_engine:
    name: Unit Tests (Engine)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Run Engine Tests
      run: cargo test ui::autocomplete::engine::tests --verbose
